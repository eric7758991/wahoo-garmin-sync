name: Wahoo to Garmin CN Sync

on:
  # 定时触发：每 15 分钟运行一次
  # 注意：GitHub Actions schedule 可能有 5-30 分钟延迟，高频任务在空闲仓库上可能被降频
  schedule:
    - cron: '*/15 * * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install garminconnect

      - name: 运行同步脚本
        env:
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          WAHOO_SENDER: ${{ secrets.WAHOO_SENDER }}
          MAIL_FOLDER: ${{ secrets.MAIL_FOLDER }}
        run: python sync_wahoo_to_garmin.py

      - name: 提交已处理记录
        # 将 processed_emails.json 提交回仓库，用于下次运行去重
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/processed_emails.json ]; then
            git add data/processed_emails.json
            git commit -m "chore: update processed emails cache [skip ci]" || echo "No changes to commit"
            git push || echo "Push failed, will retry next run"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
